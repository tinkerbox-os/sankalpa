<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sankalpa — a daily ritual for your manifestations.">
  <meta name="theme-color" content="#EADFD0">

  <!-- iOS / installable web app -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sankalpa">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Open Graph -->
  <meta property="og:title" content="Sankalpa">
  <meta property="og:description" content="A daily ritual for your manifestations.">
  <meta property="og:type" content="website">

  <title>Sankalpa</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Register the custom service worker. Built with `--pwa-strategy=none`
    // so this is the ONLY SW for the app — handles app-shell caching plus
    // soundscape audio caching.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        // First, unregister Flutter's auto-generated SW from prior builds
        // so the new sw.js takes over cleanly.
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) {
            var url = (r.active && r.active.scriptURL) || '';
            if (url.indexOf('flutter_service_worker') !== -1) {
              r.unregister();
            }
          });
        }).finally(function () {
          navigator.serviceWorker.register('sw.js').catch(function (err) {
            console.warn('SW registration failed:', err);
          });
        });
      });
    }
  </script>
</body>
</html>
